name: Check for new releases

on:
  schedule:
    - cron: '0 6 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-npm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get current version
        id: current
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)" 2>/dev/null || echo "0.0.0")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Get latest npm version
        id: npm
        run: |
          LATEST=$(curl -sL https://registry.npmjs.org/zeroclaw | node -e "
            let d = '';
            process.stdin.on('data', c => d += c);
            process.stdin.on('end', () => console.log(JSON.parse(d)['dist-tags'].latest));
          ")
          echo "version=$LATEST" >> $GITHUB_OUTPUT

      - name: Compare versions
        id: compare
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          LATEST="${{ steps.npm.outputs.version }}"
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          if [ "$CURRENT" != "$LATEST" ]; then
            echo "needs_update=true" >> $GITHUB_OUTPUT
          fi

      - name: Bump version
        if: steps.compare.outputs.needs_update == 'true'
        run: |
          echo "{ \"name\": \"zeroclaw-snap-stage\", \"version\": \"${{ steps.npm.outputs.version }}\", \"private\": true }" > package.json
          git config user.name "zeroclaw-ci"
          git config user.email "ci@zeroclaw.dev"
          git add package.json
          git commit -m "bump: version to ${{ steps.npm.outputs.version }}" || echo "no changes"
          git push || true

      - name: Create release
        if: steps.compare.outputs.needs_update == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.npm.outputs.version }}
          name: Release ${{ steps.npm.outputs.version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
