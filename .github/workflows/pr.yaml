name: PR smoke test

on:
  pull_request:
    paths:
      - 'snap/**'
      - 'package.json'

permissions:
  contents: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install snapd
        run: |
          sudo apt-get update
          sudo apt-get install -y snapd
          sudo ln -sf /var/lib/snapd/snap /snap

      - name: Start snapd
        run: |
          sudo systemctl start snapd
          sudo systemctl start snapd.socket
          sleep 5

      - name: Install snapcraft
        run: sudo snap install snapcraft --channel=8.x/stable --classic

      - name: Build snap
        run: snapcraft pack

      - name: Install snap
        run: |
          SNAP_FILE=$(ls -t zeroclaw_*.snap | head -1)
          if [ -z "$SNAP_FILE" ]; then
            echo "No snap file found"
            exit 1
          fi
          echo "Installing $SNAP_FILE"
          sudo snap install --dangerous "$SNAP_FILE" --classic
          snap wait system seed.loaded
          sleep 5

      - name: Test zeroclaw CLI
        run: |
          zeroclaw --version 2>&1 || true
          zeroclaw --help 2>&1 | head -20 || true

      - name: Test daemon command
        run: |
          zeroclaw.daemon --help 2>&1 | head -20 || true
