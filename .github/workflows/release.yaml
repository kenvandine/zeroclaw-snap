name: Release to candidate

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install snapd
        run: |
          sudo apt-get update
          sudo apt-get install -y snapd
          sudo ln -sf /var/lib/snapd/snap /snap

      - name: Start snapd
        run: |
          sudo systemctl start snapd
          sudo systemctl start snapd.socket
          sleep 5

      - name: Install snapcraft
        run: sudo snap install snapcraft --channel=8.x/stable --classic

      - name: Login to Snap Store
        run: echo "${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}" | snapcraft login --credentials-standard

      - name: Build snap
        run: snapcraft pack

      - name: Publish to candidate
        run: snapcraft upload --release=candidate zeroclaw_*.snap
