name: Candidate build

# When upstream cuts a new release, build it and publish to the candidate
# channel for QA. Promotion to stable is manual (see promote.yaml). No GitHub
# releases are created: we compare upstream against the version already in the
# store's candidate channel and only build when it is newer.
on:
  schedule:
    - cron: '0 6 * * 1-5'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.v.outputs.build }}
      upstream: ${{ steps.v.outputs.upstream }}
    steps:
      - name: Compare upstream vs store candidate
        id: v
        run: |
          UP=$(curl -sL https://registry.npmjs.org/zeroclaw | jq -r '."dist-tags".latest')
          UP=${UP#v}
          CUR=$(curl -fsSL -H 'Snap-Device-Series: 16' \
            "https://api.snapcraft.io/v2/snaps/info/zeroclaw" 2>/dev/null \
            | jq -r '[.["channel-map"][] | select(.channel.architecture=="amd64" and .channel.name=="candidate") | .version] | first // ""')
          echo "upstream=$UP"   >> "$GITHUB_OUTPUT"
          echo "candidate=$CUR" >> "$GITHUB_OUTPUT"
          if [ -n "$UP" ] && [ "$UP" != "$CUR" ]; then
            echo "build=yes" >> "$GITHUB_OUTPUT"
          else
            echo "build=no" >> "$GITHUB_OUTPUT"
          fi
          echo "upstream='$UP' candidate='$CUR'"

  build:
    needs: check
    if: needs.check.outputs.build == 'yes'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build snap
        id: build
        uses: snapcore/action-build@v1

      - name: Publish to candidate (${{ needs.check.outputs.upstream }})
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: ${{ steps.build.outputs.snap }}
          release: candidate
