name: Edge build

# Unstable builds: rebuild whenever the packaging on main changes, and once a
# day to pick up new upstream releases. Published to the edge channel.
on:
  push:
    branches: [main]
    paths:
      - 'snap/**'
      - '.github/workflows/edge.yaml'
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-edge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build snap
        id: build
        uses: snapcore/action-build@v1

      - name: Publish to edge
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: ${{ steps.build.outputs.snap }}
          release: edge
