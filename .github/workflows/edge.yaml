name: Edge build

# Unstable builds: rebuild whenever the packaging on main changes, and once a
# day to pick up new upstream releases. Published to the edge channel.
on:
  push:
    branches: [main]
    paths:
      - 'snap/**'
      - '.github/workflows/edge.yaml'
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-edge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build snap
        id: build
        uses: snapcore/action-build@v1

      - name: Publish to edge
        run: |
          echo "${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}" | snapcraft login --credentials-standard
          snapcraft upload --release=edge "${{ steps.build.outputs.snap }}"
