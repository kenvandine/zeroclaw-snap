name: Promote candidate to stable

# Manual QA gate: promote the current candidate revision(s) to stable.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Install snapcraft
        run: sudo snap install snapcraft --classic

      - name: Promote candidate -> stable
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        run: snapcraft promote zeroclaw --from-channel candidate --to-channel stable --yes
